  <text x="190" y="86" text-anchor="middle" class="mono" font-size="11" fill="#6b6f7a">Via Roma 14 · Barcelona</text>
  <text x="190" y="102" text-anchor="middle" class="mono" font-size="11" fill="#6b6f7a">Tel. 934 000 000</text>

