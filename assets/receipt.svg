<svg width="380" height="580" viewBox="0 0 380 580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#2a2a4a" flood-opacity="0.28" />
    </filter>
    <style>
      .mono { font-family: 'Space Mono', 'Courier New', monospace; }
      .h { font-family: 'Space Mono', 'Courier New', monospace; font-weight: 700; }
    </style>
