  <rect x="64" y="402" width="252" height="40" rx="8" fill="#1a1c22" />
  <text x="80" y="427" class="h" font-size="15" fill="#ffffff">TOTAL</text>
  <text x="300" y="427" text-anchor="end" class="h" font-size="16" fill="#ffffff">74,50 $</text>

  <line x1="64" y1="466" x2="316" y2="466" stroke="#c8cac2" stroke-width="1.5" stroke-dasharray="3 4" />

  <text x="190" y="492" text-anchor="middle" class="mono" font-size="11" fill="#6b6f7a">Gracias por su visita · Grazie!</text>

